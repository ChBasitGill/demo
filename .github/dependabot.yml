# Dependabot configuration for an Nx Angular project.
# package.json lives at the repo root, so all npm entries use directory: "/".
# A companion rename workflow (.github/workflows/rename-dependabot-branch.yml)
# shortens every Dependabot branch to  bot/<package>-<version>  (≤ 45 chars).

version: 2
updates:
  # ── npm / yarn ────────────────────────────────────────────────────────────
  # Nx projects keep a single root package.json; use "/" so the directory
  # segment is not added to the branch name.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    # Separate path parts with "-" so the raw branch is always Docker-tag-safe.
    pull-request-branch-name:
      separator: "-"

  # ── Docker ────────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "-"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "-"
